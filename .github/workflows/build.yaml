name: Build rTorrent

permissions: write-all

on:
  workflow_dispatch:
    inputs:
      version:
        description: "rTorrent version to build"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "0.15.7"
          - "0.16.11"

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generating matrix
        id: generate
        run: |
          pip3 install --upgrade pyyaml
          echo "Generating matrix..."
          MATRIX=$(python3 matrix.py)
          echo "$MATRIX" > matrix.json
          echo "matrix<<EOF" >> $GITHUB_ENV
          cat matrix.json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Filter matrix for workflow_dispatch
        run: |
          pip3 install --upgrade pyyaml
          python3 << 'PY'
          import os, sys, yaml
          key = os.environ["MATRIX_VERSION_KEY"]
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          sel = os.environ.get("WF_VERSION", "all")
          with open("matrix.json") as f:
              data = yaml.safe_load(f)
          inc = list(data.get("include") or [])
          if event == "workflow_dispatch" and sel and sel != "all":
              inc = [r for r in inc if str(r.get(key)) == sel]
              if not inc:
                  sys.stderr.write(f"::error::No matrix entry where {key}={sel!r}\n")
                  sys.exit(1)
          with open("matrix.json", "w") as f:
              yaml.safe_dump({"include": inc}, f, sort_keys=False)
          print(yaml.safe_dump({"include": inc}, sort_keys=False))
          PY
          {
            echo 'matrix<<EOF'
            cat matrix.json
            echo 'EOF'
          } >> "$GITHUB_ENV"
        env:
          MATRIX_VERSION_KEY: version
          WF_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || 'all' }}

      - name: Setup matrix
        id: set
        uses: druzsan/setup-matrix@v2
        with:
          matrix: |
            ${{ env.matrix }}

  build:
    name: v${{ matrix.version }} (${{ matrix.os }})
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
      max-parallel: 8
    container:
      image: debian:trixie
    env:
      DEBIAN_FRONTEND: noninteractive
      COMMITTER_NAME: ${{ secrets.COMMITTER_NAME }}
      COMMITTER_EMAIL: ${{ secrets.COMMITTER_EMAIL }}

    steps:
      - name: Setup variables
        id: vars
        run: |
          echo "build_script=tools/packages/rtorrent/build.sh" >> $GITHUB_OUTPUT
          echo "package_name=krate-rtorrent" >> $GITHUB_OUTPUT
          echo "metadata_script=tools/generate_metadata.sh" >> $GITHUB_OUTPUT
          echo "control_file=tools/packages/rtorrent/control" >> $GITHUB_OUTPUT
          echo "package_script=tools/generate_package.sh" >> $GITHUB_OUTPUT
          echo "temp_dir=/tmp/rtorrent-build/install" >> $GITHUB_OUTPUT
          for script in $(find tools/ -name "*.sh"); do
            chmod +x $script
          done

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout tools repository
        uses: actions/checkout@v6
        with:
          repository: krate-binaries/tools
          path: tools

      - name: Update APT
        run: |
          apt-get update -qq
          apt-get install -yqq --no-install-recommends \
            ca-certificates curl wget git jq \
            lsb-release gnupg debian-archive-keyring debian-keyring \
            debconf-utils sudo \
            build-essential cmake pkg-config patchelf \
            libssl-dev zlib1g-dev libbz2-dev libreadline-dev \
            libncurses5-dev libncursesw5-dev \
            libcurl4-openssl-dev libicu-dev libgeoip-dev \
            autoconf automake libtool autoconf-archive intltool \
            gzip xz-utils file dpkg rsync \
            upx-ucl
        shell: bash

      - name: Clean output and artifacts
        run: |
          rm -rf output artifacts
          mkdir -p output artifacts
      - name: Download and install dependency packages
        id: dependencies
        shell: bash
        run: |
          download_asset() {
            local version="$1"
            local filename="$2"
            local repo="$3"
            local tag="v${version}"
            local assets_url=$(curl -s "https://api.github.com/repos/${repo}/releases/tags/${tag}" | jq -r '.assets_url')
            if [ -z "$assets_url" ] || [ "$assets_url" = "null" ]; then
              echo "Release not found for $repo $tag"
              return 1
            fi
            local download_url=$(curl -s "$assets_url" | jq -r ".[] | select(.name == \"${filename}\") | .browser_download_url")
            if [ -z "$download_url" ] || [ "$download_url" = "null" ]; then
              echo "Asset not found: $filename in $repo $tag"
              return 1
            fi
            echo "Downloading from: $download_url"
            if command -v curl >/dev/null 2>&1; then
              curl -L -o "$filename" "$download_url"
            else
              wget -O "$filename" "$download_url"
            fi
            return 0
          }
          codename=$(lsb_release -cs)
          distro=$(lsb_release -is | tr '[:upper:]' '[:lower:]')
          os="$distro-$codename"

          declare -A packages=(
            ["xmlrpc-c"]="libxmlrpc-c3_${{ matrix.xmlrpc_c_version }}-1_amd64.deb|krate-binaries/xmlrpc-c-builds|${{ matrix.xmlrpc_c_version }}"
            ["libudns"]="libudns_${{ matrix.libudns_version }}-ipv6-ON-1build1_amd64.deb|krate-binaries/libudns-builds|${{ matrix.libudns_version }}"
            ["dumptorrent"]="dumptorrent_${{ matrix.dumptorrent_version }}-ubuntu-latest_amd64.deb|tomcdj71/dumptorrent|${{ matrix.dumptorrent_version }}"
            ["mktorrent"]="mktorrent_${{ matrix.mktorrent_version }}_openssl-ON_pthreads-ON-ubuntu-noble_amd64.deb|tomcdj71/mktorrent|${{ matrix.mktorrent_version }}"
          )
          for pkg in "${!packages[@]}"; do
            IFS='|' read -r filename repo version <<< "${packages[$pkg]}"
            if [ "$pkg" = "xmlrpc-c" ] && { [ "$version" = "" ] || [ "$version" = "null" ]; }; then
              sudo apt-get install -yqq tinyxml2-*
            else
              if [[ "$filename" == mktorrent* && "$version" != "1.5.0" ]]; then
                filename="${filename/ubuntu-noble/ubuntu-latest}"
              fi
              if download_asset "$version" "$filename" "$repo"; then
                if [ "$pkg" != "mktorrent" ]; then
                  sudo dpkg -i "$filename" || true
                elif [[ "$filename" == mktorrent* && "$version" == "1.5.0" ]]; then
                  sudo dpkg -i "$filename" || true
                fi
              else
                echo "::error::Failed to download $filename"
                exit 1
              fi
            fi
          done

          sudo apt-get install -f -y
          echo "dependencies=done" >> $GITHUB_OUTPUT
          echo "======> All dependency packages installed successfully"

      - name: Build rTorrent
        id: build
        run: |
          sed -i "s/@PACKAGE_NAME@/${{ steps.vars.outputs.package_name }}/" ${{ steps.vars.outputs.control_file }}
          sed -i "s/@MAINTAINER@/${{ secrets.COMMITTER_NAME }} <${{ secrets.COMMITTER_EMAIL }}>/" ${{ steps.vars.outputs.control_file }}
          chmod +x ${{ steps.vars.outputs.build_script }}
          ./${{ steps.vars.outputs.build_script }} ${{ matrix.version }}
          echo "compiled=true" >> $GITHUB_OUTPUT

      - name: Generate metadata
        if: steps.build.outputs.compiled == 'true'
        run: |
          set -eu
          # build.sh leaves the .deb under tools/ (see package_rtorrent_deb); avoid find / (proc errors + exit 1)
          deb=$(find "${GITHUB_WORKSPACE}/tools" -maxdepth 1 -name 'krate-rtorrent*.deb' | head -n 1)
          if [ ! -f "$deb" ]; then
            echo "::error::DEB not found under ${GITHUB_WORKSPACE}/tools"
            ls -la "${GITHUB_WORKSPACE}/tools" || true
            exit 1
          fi
          mkdir -p artifacts
          cp "$deb" artifacts/
          codename=$(lsb_release -cs)
          distro=$(lsb_release -is | tr '[:upper:]' '[:lower:]')
          os="$distro-$codename"
          cd artifacts
          ../${{ steps.vars.outputs.metadata_script }} \
            --category "rtorrent" \
            --tag "release" \
            --version "${{ matrix.version }}" \
            --os "${codename}" \
            "$(basename "$deb")"
          ls -l

      - name: Upload as Artifact
        if: steps.build.outputs.compiled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rtorrent-${{ matrix.version }}-${{ matrix.os }}
          path: artifacts/*
          retention-days: 1

  release:
    name: Create Releases
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ["0.15.7", "0.16.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout tools repository
        uses: actions/checkout@v6
        with:
          repository: krate-binaries/tools
          path: tools

      - name: Download artifacts for this version
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts
          pattern: rtorrent-*${{ matrix.version }}*
      - name: Prepare release assets
        id: prepare
        run: |
          mkdir -p release_assets
          find downloaded_artifacts -type f \
            \( -name "krate-rtorrent*${{ matrix.version }}*.deb" -o \
              -name "krate-rtorrent*${{ matrix.version }}*.json" \) \
            -exec cp {} release_assets/ \;
          pip3 install --upgrade pyyaml
          python3 tools/ci/release_notes.py \
            --product rtorrent \
            --version "${{ matrix.version }}" \
            --assets-dir release_assets \
            --github-output
          ls -la release_assets/
          if [[ ${{ matrix.version }} == *"rc"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          if [[ -z "$(ls release_assets/*.deb 2>/dev/null)" ]]; then
            echo "skip_release=true" >> $GITHUB_OUTPUT
            echo "No packages to release"
            ls -lah release_assets/
          else
            echo "skip_release=false" >> $GITHUB_OUTPUT
          fi
      - name: Create Release
        if: steps.prepare.outputs.skip_release == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ matrix.version }}
          name: rTorrent ${{ matrix.version }}
          files: |
            release_assets/*
          draft: false
          prerelease: ${{ steps.prepare.outputs.prerelease }}
          generate_release_notes: false
          body: ${{ steps.prepare.outputs.release_body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
